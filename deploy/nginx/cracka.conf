# Cracka la password — nginx front door.
# Matches requests to host blas.inf.usi.ch on port 80 and proxies to the
# container published on 127.0.0.1:3100 (see compose.yaml). Does NOT take
# the default_server flag, so the existing default_server (Grafana/admin)
# keeps handling IP-only / unmatched hostnames.

server {
    listen 80;
    listen [::]:80;
    server_name blas.inf.usi.ch;

    # Reasonable upper bound for a kid typing a password hash.
    client_max_body_size 64k;

    # WebSocket endpoint — hashcat stream.
    location /ws {
        proxy_pass http://127.0.0.1:3100/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cracks can take a long time on brute-force fallback; keep the WS open.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Everything else — static frontend served by express.static.
    location / {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
